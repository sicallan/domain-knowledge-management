name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: typecheck · lint · test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Unit & contract tests
        run: pnpm run test

  enrichment-python:
    name: enrichment · ruff · mypy · pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: modules/enrichment
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev extras
        # The `llm` extra (Anthropic SDK) is intentionally NOT installed — CI has no
        # secrets and the real-Claude golden eval (`-m llm`) is never a CI gate.
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Typecheck (mypy)
        run: mypy

      - name: Tests (no network)
        run: pytest -m 'not llm'
