<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" role="img" aria-label="Veritgraph">
  <title>Veritgraph — the domain truth layer for agentic AI</title>
  <defs>
    <linearGradient id="vg-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe27a"/><stop offset="1" stop-color="#f5b301"/>
    </linearGradient>
    <linearGradient id="vg-ind" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a5b4fc"/><stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <g transform="translate(6,4) scale(0.92)">
    <g stroke="url(#vg-ind)" stroke-width="3.5" stroke-linecap="round" opacity="0.6">
      <line x1="60" y1="60" x2="98" y2="33"/>
      <line x1="60" y1="60" x2="66" y2="104"/>
      <line x1="60" y1="60" x2="18" y2="70"/>
    </g>
    <g fill="#0a0e1c" stroke="url(#vg-ind)" stroke-width="3.5">
      <circle cx="98" cy="33" r="7.5"/>
      <circle cx="66" cy="104" r="7.5"/>
      <circle cx="18" cy="70" r="7.5"/>
    </g>
    <polygon points="60,34 82.5,47 82.5,73 60,86 37.5,73 37.5,47"
             fill="url(#vg-gold)" stroke="#f5b301" stroke-width="2"/>
    <circle cx="60" cy="60" r="5.5" fill="#1a1206"/>
  </g>
  <!-- Wordmark (dark ink — for light backgrounds; swap fill to #f1f4ff on dark) -->
  <text x="132" y="58" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif"
        font-size="46" font-weight="800" letter-spacing="-1.2" fill="#0c1024">Verit<tspan fill="#f5b301">graph</tspan></text>
  <text x="134" y="86" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif"
        font-size="15.5" font-weight="600" letter-spacing="0.2" fill="#6b7280">The domain truth layer for agentic AI</text>
</svg>
