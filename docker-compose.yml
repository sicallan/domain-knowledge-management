# DKM QUICKSTART stack.
#
#   docker compose up
#     → gateway (http://localhost:4000/graphql) + studio (http://localhost:5173)
#       seeded with the bundled Payments demo. Zero secrets, ~2 minutes. (Tier A)
#
# Process YOUR documents (Tier B):
#   ./scripts/dkm process ./my-docs --domain lending     # → data/lending/*.jsonl
#   DKM_DOMAIN=lending docker compose up                 # the UI now serves your graph
# The gateway falls back to the demo whenever the selected source has no JSONL, so an empty
# ./data is always fine.

services:
  gateway:
    build: .
    image: dkm-app
    command: pnpm exec tsx apps/api-gateway/src/server.ts
    environment:
      PORT: "4000"
      # Serve data/<DKM_DOMAIN>/*.jsonl when a domain is selected, else data/*.jsonl, else demo.
      DKM_DATA_DIR: /app/data
      DKM_DOMAIN: ${DKM_DOMAIN:-}
    volumes:
      # Your processed domain data (and the JSONL you analyse with your own LLM) lives here.
      - ./data:/app/data
    ports:
      - "4000:4000"

  studio:
    build: .
    image: dkm-app
    command: pnpm --filter @dkm/knowledge-studio exec vite --host 0.0.0.0 --port 5173
    environment:
      # The Vite dev server proxies /graphql to the gateway service (same-origin in the browser).
      VITE_GRAPHQL_PROXY: http://gateway:4000
    ports:
      - "5173:5173"
    depends_on:
      - gateway

  # The Tier-B document processor (Node connectors + Python LLM extraction). Not started by
  # `docker compose up` (it's in the `process` profile) — run it via `./scripts/dkm process`,
  # which mounts your docs at /input and appends `/input --domain <name> [--fake]`.
  processor:
    build:
      context: .
      dockerfile: Dockerfile.processor
    image: dkm-processor
    profiles: ["process"]
    environment:
      DKM_DATA_DIR: /app/data
      # Passed through for real (non-fake) extraction.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - ./data:/app/data
